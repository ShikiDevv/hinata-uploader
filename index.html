<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hinata Uploader</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* -- الأساسيات -- */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        
        body {
            background-color: #0d0d0d;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* -- صور الستيكرات -- */
        .sticker {
            position: fixed;
            z-index: 0;
            pointer-events: none;
            filter: drop-shadow(0 0 10px rgba(0, 0, 0, 0.5));
        }

        .sticker-1 {
            right: 30px;
            top: 30px;
            width: 250px;
            opacity: 0.9;
            animation: float 4s ease-in-out infinite;
        }

        .sticker-2 {
            left: 30px;
            bottom: 30px;
            width: 250px;
            opacity: 0.9;
            animation: float 5s ease-in-out infinite reverse;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        /* -- صندوق الرفع -- */
        .upload-box {
            background: #1a1a1a;
            border: 2px solid #333;
            border-radius: 20px;
            padding: 40px;
            width: 420px;
            text-align: center;
            z-index: 10;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
            position: relative;
        }

        h2 { color: #fff; margin-bottom: 25px; font-size: 24px; letter-spacing: 1px; }

        /* منطقة السحب */
        .drop-zone {
            border: 2px dashed #444;
            border-radius: 15px;
            padding: 40px 20px;
            background: #121212;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .drop-zone:hover { border-color: #ff4d6d; background: #1f1f1f; }
        .drop-zone p { color: #777; margin-top: 10px; font-size: 14px; }
        .icon { font-size: 40px; color: #555; margin-bottom: 10px; }
        input[type="file"] { display: none; }

        /* معاينة الصورة */
        #preview-image {
            max-width: 100%;
            max-height: 150px;
            border-radius: 8px;
            border: 2px solid #333;
            display: none;
        }

        /* حالة التحميل */
        .status-msg {
            margin-top: 15px;
            color: #aaa;
            font-size: 14px;
            display: none;
        }

        /* -- النتيجة -- */
        .result-area {
            margin-top: 20px;
            display: none;
            background: #0d0d0d;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #333;
        }

        .link-box {
            background: #1f1f1f;
            padding: 8px;
            border-radius: 5px;
            display: flex;
            align-items: center;
            gap: 5px;
            border: 1px solid #333;
        }

        .link-box input {
            flex: 1;
            background: none;
            border: none;
            color: #ff4d6d;
            outline: none;
            direction: ltr;
            font-size: 12px;
            font-family: monospace;
        }

        .copy-btn {
            background: #ff4d6d;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
            font-family: sans-serif;
        }

        .copy-btn:hover { background: #c9184a; }

        /* -- زر لصق الصورة -- */
        .paste-btn {
            margin-top: 20px;
            background: transparent;
            color: #888;
            border: 1px solid #444;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-size: 14px;
            transition: 0.3s;
        }

        .paste-btn:hover {
            border-color: #ff4d6d;
            color: #ff4d6d;
        }

        /* خانة اللصق */
        .paste-area {
            margin-top: 20px;
            border: 1px dashed #444;
            border-radius: 8px;
            padding: 15px;
            background: #0d0d0d;
            display: none; /* مخفية مبدئياً */
            position: relative;
            outline: none;
        }

        /* تأثير وميض عند الاستعداد للصق */
        @keyframes pulse {
            0% { border-color: #ff4d6d; }
            50% { border-color: #444; }
            100% { border-color: #ff4d6d; }
        }

        .paste-area.waiting {
            animation: pulse 1.5s infinite;
        }

        .paste-area p {
            color: #555;
            font-size: 13px;
            margin: 0;
        }

        /* الرسالة التحذيرية أسفل الخانة */
        .paste-instruction {
            display: block;
            margin-top: 10px;
            color: #666;
            font-size: 12px;
            text-align: center;
            width: 100%;
        }

        /* -- زر الإلغاء (X) الجديد -- */
        .cancel-btn {
            position: absolute;
            top: 10px;
            right: 10px; /* أقصى اليمين */
            background: #ff0000;
            color: white;
            border: none;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            font-size: 14px;
            line-height: 25px;
            text-align: center;
            cursor: pointer;
            display: none; /* مخفي مبدئياً */
            z-index: 20;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
            font-weight: bold;
            font-family: sans-serif;
        }

        .cancel-btn:hover {
            background: #cc0000;
            transform: scale(1.1);
        }

        /* تجاوب الجوال */
        @media (max-width: 768px) {
            .sticker { width: 120px !important; }
            .upload-box { width: 90%; padding: 20px; }
        }
    </style>
</head>
<body>

    <!-- ستيكرات أنمي -->
    <img src="https://files.catbox.moe/b3o5cs.jpg" class="sticker sticker-1" alt="Anime 1">
    <img src="https://files.catbox.moe/qk977p.jpg" class="sticker sticker-2" alt="Anime 2">

    <div class="upload-box">
        <h2>Hinata Uploader</h2>
        
        <div class="drop-zone" id="dropZone">
            <!-- زر الإلغاء (X) وضعته هنا داخل منطقة السحب -->
            <button class="cancel-btn" id="cancelBtn" onclick="removeImage()">×</button>
            
            <div class="icon" id="mainIcon">⚡</div>
            <p id="mainText">Click here or drag image</p>
            <input type="file" id="fileInput" accept="image/*">
            <img id="preview-image" alt="Preview">
        </div>

        <div class="status-msg" id="statusMsg">Uploading...</div>

        <div class="result-area" id="resultArea">
            <div class="link-box">
                <input type="text" id="linkUrl" readonly>
                <button class="copy-btn" onclick="copyLink()">Copy Link</button>
            </div>
        </div>

        <!-- زر لصق الصورة -->
        <button class="paste-btn" id="togglePasteBtn" onclick="togglePasteArea()">Paste Image</button>

        <!-- منطقة اللصق -->
        <div class="paste-area" id="pasteArea" tabindex="0">
            <p>Paste Area (Click here first)</p>
            <!-- رسالة التعليمات -->
            <span class="paste-instruction" id="pasteInstruction">Press Ctrl + V to paste image</span>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const previewImg = document.getElementById('preview-image');
        const resultArea = document.getElementById('resultArea');
        const linkUrl = document.getElementById('linkUrl');
        const statusMsg = document.getElementById('statusMsg');
        const mainIcon = document.getElementById('mainIcon');
        const mainText = document.getElementById('mainText');
        
        // عناصر اللصق
        const togglePasteBtn = document.getElementById('togglePasteBtn');
        const pasteArea = document.getElementById('pasteArea');
        const pasteInstruction = document.getElementById('pasteInstruction');

        // زر الإلغاء
        const cancelBtn = document.getElementById('cancelBtn');

        const API_KEY = 'ضع هنا مفتاحك';

        // --- أحداث السحب والضغط ---
        dropZone.addEventListener('click', (e) => {
            // نتأكد أن الضغط لم يكن على زر الإلغاء
            if (e.target !== cancelBtn) {
                fileInput.click();
            }
        });
        
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = '#ff4d6d';
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.style.borderColor = '#444';
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = '#444';
            if (e.dataTransfer.files[0]) {
                handleFile(e.dataTransfer.files[0]);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files[0]) {
                handleFile(e.target.files[0]);
            }
        });

        // --- خاصية اللصق ---
        
        function togglePasteArea() {
            const isVisible = pasteArea.style.display === 'block';
            if (isVisible) {
                pasteArea.style.display = 'none';
                pasteArea.classList.remove('waiting');
                togglePasteBtn.style.display = 'block';
            } else {
                pasteArea.style.display = 'block';
                pasteArea.classList.add('waiting');
                togglePasteBtn.style.display = 'none';
                pasteInstruction.style.display = 'block';
                pasteArea.focus();
            }
        }

        pasteArea.addEventListener('paste', (e) => {
            const items = (e.clipboardData || e.originalEvent.clipboardData).items;
            
            for (let item of items) {
                if (item.type.indexOf('image') !== -1) {
                    const file = item.getAsFile();
                    if (file) {
                        handleFile(file);
                        pasteArea.style.display = 'none';
                        togglePasteBtn.style.display = 'block';
                        pasteInstruction.style.display = 'none';
                        break;
                    }
                }
            }
        });

        // --- دالة معالجة الصورة (تعديل لإظهار زر X) ---
        function handleFile(file) {
            if (!file || !file.type.startsWith('image/')) return;

            mainIcon.style.display = 'none';
            mainText.style.display = 'none';
            resultArea.style.display = 'none';
            previewImg.style.display = 'none';
            
            // إظهار زر الإلغاء
            cancelBtn.style.display = 'block';

            const reader = new FileReader();
            reader.onload = (e) => {
                previewImg.src = e.target.result;
                previewImg.style.display = 'block';
                uploadImage(e.target.result);
            }
            reader.readAsDataURL(file);
        }

        // --- دالة إلغاء الصورة (الجديدة) ---
        function removeImage() {
            previewImg.src = '';
            previewImg.style.display = 'none';
            cancelBtn.style.display = 'none'; // إخفاء زر الإلغاء
            
            mainIcon.style.display = 'block';
            mainText.style.display = 'block';
            
            statusMsg.style.display = 'none';
            resultArea.style.display = 'none';
            
            // إعادة تعيين حقل الملف لاختيار نفس الصورة مرة أخرى إذا أراد
            fileInput.value = '';
        }

        async function uploadImage(base64Image) {
            statusMsg.style.display = 'block';
            statusMsg.innerText = "Uploading...";
            statusMsg.style.color = "#aaa";

            const formData = new FormData();
            formData.append('image', base64Image.split(',')[1]); 
            formData.append('key', API_KEY);

            try {
                const response = await fetch('https://api.imgbb.com/1/upload', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.success) {
                    const link = data.data.url;
                    
                    statusMsg.style.display = 'none';
                    linkUrl.value = link;
                    resultArea.style.display = 'block';
                    
                    // إخفاء زر الإلغاء بعد النجاح لأن الصورة اتحملت
                    cancelBtn.style.display = 'none';
                    
                    autoCopy(link);
                } else {
                    throw new Error('Upload failed');
                }
            } catch (error) {
                console.error(error);
                statusMsg.innerText = "Error! Try again.";
                statusMsg.style.color = "red";
                setTimeout(() => {
                    statusMsg.style.display = 'none';
                    mainIcon.style.display = 'block';
                    mainText.style.display = 'block';
                    previewImg.style.display = 'none';
                    cancelBtn.style.display = 'none';
                }, 2000);
            }
        }

        function copyLink() {
            autoCopy(linkUrl.value);
            const btn = document.querySelector('.copy-btn');
            btn.innerText = "Copied!";
            setTimeout(() => btn.innerText = "Copy Link", 1500);
        }

        function autoCopy(text) {
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(() => {
                    console.log("Auto-copied");
                }).catch(err => {
                    fallbackCopy(text);
                });
            } else {
                fallbackCopy(text);
            }
        }

        function fallbackCopy(text) {
            linkUrl.select();
            document.execCommand('copy');
        }
    </script>
</body>
</html>
